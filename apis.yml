description: >-
  Susquehanna International Group (SIG) is a privately held global
  quantitative trading firm founded in 1987 by a group of college friends
  who began trading on the Philadelphia Stock Exchange, leveraging
  quantitative skills and poker-derived decision science. Headquartered in
  Bala Cynwyd, Pennsylvania, the firm employs more than 3,500 people across
  17+ offices worldwide and operates as one of the largest options market
  makers globally. SIG's businesses span Quantitative Trading, Predictions,
  Institutional Sales, Growth Equity (Susquehanna Growth Equity / SGE),
  Sustainable Investments, Asia-focused Venture Capital (notably an early
  and large stake in ByteDance), and the River's Edge promotional arm. SIG
  does not operate a public developer portal, expose external trading APIs,
  or publish open-source repositories under a public GitHub organization;
  all technology is internal to the trading and quantitative research
  platform. Public surface is limited to sig.com (company / careers /
  insights), the SGE site, and corporate communications.
